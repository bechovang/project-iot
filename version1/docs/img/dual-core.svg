<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="500" fill="#0f172a"/>
  <text x="450" y="34" fill="#e2e8f0" font-size="20" font-weight="700" text-anchor="middle">Dual-Core Architecture (ESP32)</text>
  <text x="450" y="56" fill="#94a3b8" font-size="13" text-anchor="middle">Network @ Core 0  |  Audio + UI @ Core 1  |  Shared state co bao ve</text>

  <!-- Core 0 -->
  <rect x="40" y="80" width="360" height="180" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="220" y="106" fill="#fbbf24" font-size="15" font-weight="700" text-anchor="middle">CORE 0 (PRO_CPU) - cung core WiFi</text>
  <rect x="70" y="120" width="300" height="120" rx="8" fill="#0b3b2e" stroke="#34d399"/>
  <text x="220" y="142" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">NetworkTask</text>
  <text x="220" y="166" fill="#cbd5e1" font-size="12" text-anchor="middle">giu / reconnect WiFi</text>
  <text x="220" y="186" fill="#cbd5e1" font-size="12" text-anchor="middle">HTTP GET current + paid (blocking)</text>
  <text x="220" y="206" fill="#cbd5e1" font-size="12" text-anchor="middle">parse JSON</text>
  <text x="220" y="228" fill="#6ee7b7" font-size="11" text-anchor="middle">blocking o day KHONG hai audio</text>

  <!-- Core 1 -->
  <rect x="500" y="80" width="360" height="180" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="680" y="106" fill="#7dd3fc" font-size="15" font-weight="700" text-anchor="middle">CORE 1 (APP_CPU)</text>
  <rect x="530" y="120" width="300" height="120" rx="8" fill="#0b2e3b" stroke="#38bdf8"/>
  <text x="680" y="142" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">loop() = Audio + UI</text>
  <text x="680" y="166" fill="#cbd5e1" font-size="12" text-anchor="middle">audio.loop() lien tuc (real-time)</text>
  <text x="680" y="186" fill="#cbd5e1" font-size="12" text-anchor="middle">render OLED / ve QR</text>
  <text x="680" y="206" fill="#cbd5e1" font-size="12" text-anchor="middle">phat loa doc so tien khi PAID</text>
  <text x="680" y="228" fill="#7dd3fc" font-size="11" text-anchor="middle">task mac dinh cua Arduino</text>

  <!-- Shared state -->
  <rect x="220" y="320" width="460" height="140" rx="12" fill="#3b2e0b" stroke="#eab308" stroke-width="2"/>
  <text x="450" y="346" fill="#fde047" font-size="15" font-weight="700" text-anchor="middle">SHARED STATE (sync_state.cpp)</text>
  <rect x="245" y="360" width="190" height="44" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="340" y="380" fill="#e2e8f0" font-size="12" text-anchor="middle">current{qr,amount,queue}</text>
  <text x="340" y="396" fill="#fca5a5" font-size="11" text-anchor="middle">bao ve bang MUTEX</text>
  <rect x="465" y="360" width="190" height="44" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="560" y="380" fill="#e2e8f0" font-size="12" text-anchor="middle">paid-event</text>
  <text x="560" y="396" fill="#6ee7b7" font-size="11" text-anchor="middle">FreeRTOS QUEUE (len=8)</text>
  <text x="450" y="430" fill="#cbd5e1" font-size="11" text-anchor="middle">g_wifi_connected (volatile bool, atomic)</text>

  <!-- arrows -->
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <!-- NetworkTask -> shared (ghi) -->
  <path d="M220 240 C 220 300, 320 300, 340 358" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#ar)"/>
  <text x="250" y="300" fill="#f59e0b" font-size="11">ghi</text>
  <!-- shared -> UI (doc) -->
  <path d="M620 360 C 660 300, 680 300, 680 244" fill="none" stroke="#38bdf8" stroke-width="2" marker-end="url(#ar)"/>
  <text x="690" y="300" fill="#38bdf8" font-size="11">doc</text>
</svg>