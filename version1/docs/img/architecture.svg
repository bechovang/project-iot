<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="420" fill="#0f172a"/>
  <text x="450" y="36" fill="#e2e8f0" font-size="20" font-weight="700" text-anchor="middle">Kien truc he thong</text>

  <!-- ESP32 box -->
  <rect x="40" y="90" width="220" height="180" rx="12" fill="#0b3b2e" stroke="#34d399" stroke-width="2"/>
  <text x="150" y="118" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">ESP32</text>
  <text x="150" y="146" fill="#cbd5e1" font-size="12" text-anchor="middle">OLED: ve QR</text>
  <text x="150" y="168" fill="#cbd5e1" font-size="12" text-anchor="middle">Loa: doc so tien</text>
  <text x="150" y="190" fill="#cbd5e1" font-size="12" text-anchor="middle">WiFi STA</text>
  <text x="150" y="220" fill="#6ee7b7" font-size="11" text-anchor="middle">poll /api/device/*</text>

  <!-- Server box -->
  <rect x="340" y="80" width="240" height="240" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="460" y="108" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">Server Python</text>
  <text x="460" y="138" fill="#cbd5e1" font-size="12" text-anchor="middle">FastAPI (app.py)</text>
  <text x="460" y="160" fill="#cbd5e1" font-size="12" text-anchor="middle">Streamlit (cashier.py)</text>
  <text x="460" y="182" fill="#cbd5e1" font-size="12" text-anchor="middle">SQLite (orders.db)</text>
  <text x="460" y="204" fill="#cbd5e1" font-size="12" text-anchor="middle">Trang TV /tv</text>
  <text x="460" y="240" fill="#7dd3fc" font-size="11" text-anchor="middle">tao link / nhan webhook</text>

  <!-- PayOS box -->
  <rect x="660" y="90" width="200" height="180" rx="12" fill="#3b0b2e" stroke="#f472b6" stroke-width="2"/>
  <text x="760" y="118" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">PayOS</text>
  <text x="760" y="146" fill="#cbd5e1" font-size="12" text-anchor="middle">Cong thanh toan</text>
  <text x="760" y="168" fill="#cbd5e1" font-size="12" text-anchor="middle">Tao QR that</text>
  <text x="760" y="190" fill="#cbd5e1" font-size="12" text-anchor="middle">Ban webhook PAID</text>

  <!-- arrows ESP32 <-> Server -->
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <line x1="260" y1="160" x2="338" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <line x1="338" y1="200" x2="260" y2="200" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="300" y="150" fill="#94a3b8" font-size="10" text-anchor="middle">poll</text>
  <text x="300" y="218" fill="#94a3b8" font-size="10" text-anchor="middle">JSON</text>
  <text x="300" y="70" fill="#64748b" font-size="11" text-anchor="middle">WiFi LAN</text>

  <!-- arrows Server <-> PayOS -->
  <line x1="580" y1="150" x2="658" y2="150" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <line x1="658" y1="200" x2="580" y2="200" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <text x="620" y="140" fill="#94a3b8" font-size="10" text-anchor="middle">tao link</text>
  <text x="620" y="218" fill="#94a3b8" font-size="10" text-anchor="middle">webhook</text>
  <text x="620" y="70" fill="#64748b" font-size="11" text-anchor="middle">Internet (HTTPS)</text>

  <!-- bottom actors -->
  <text x="150" y="320" fill="#fbbf24" font-size="12" text-anchor="middle">Khach quet QR</text>
  <line x1="150" y1="272" x2="150" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <text x="460" y="360" fill="#fbbf24" font-size="12" text-anchor="middle">Thu ngan (Streamlit) + TV cho khach</text>
  <line x1="460" y1="322" x2="460" y2="340" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
</svg>