; PlatformIO Project Configuration File for ESP32 MAX98357A MP3 Player

[env:esp32dev]
; Platform 6.x = Arduino core 2.x = GCC 8.4 (ko co C++20 <span>).
; Phai ket hop voi ESP32-audioI2S ban 2.x (tuong thich core 2.x).
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200

; Phan vung flash: app ~1.75MB + LittleFS ~2.19MB (chua data/song.mp3)
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

lib_deps =
    https://github.com/schreibfaul1/ESP32-audioI2S.git#2.0.6
